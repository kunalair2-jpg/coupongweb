<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Cou-pong</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .cart-items {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: var(--radius-md);
        }

        .item-details {
            flex: 1;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .qty-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .cart-summary {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .total-row {
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            margin-top: 1rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .cart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="ph-fill ph-tag-chevron"></i>
                Cou-<span>pong</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Continue Shopping</a>
            </div>
        </div>
    </nav>

    <div class="cart-container">
        <h1 style="margin-bottom: 2rem;">Your Cart</h1>

        <div class="cart-grid" id="cart-content">
            <!-- Cart Items -->
            <div class="cart-items" id="cart-list">
                <!-- Items injected by JS -->
                <div style="text-align: center; padding: 3rem;">
                    <div class="spinner"></div>
                    <p>Loading cart...</p>
                </div>
            </div>

            <!-- Order Summary -->
            <aside class="cart-summary">
                <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Service Fee</span>
                    <span>₹20</span>
                </div>
                <div class="summary-row" style="color: var(--success-color);">
                    <span>Discount (Coupon)</span>
                    <span>-₹0</span>
                </div>

                <div class="total-row summary-row">
                    <span>Total</span>
                    <span id="total">₹0</span>
                </div>

                <div style="margin-top: 1.5rem;">
                    <input type="text" placeholder="Promo Code" class="form-input" style="margin-bottom: 0.5rem;">
                    <button class="btn btn-secondary" style="width: 100%; padding: 0.5rem;"
                        onclick="applyPromo()">Apply</button>
                </div>

                <button class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;" onclick="proceedToCheckout()">
                    Proceed to Checkout
                </button>

                <div style="margin-top: 1rem; text-align: center; font-size: 0.85rem; color: var(--text-light);">
                    <i class="ph-fill ph-lock-key"></i> Secure Checkout
                </div>
            </aside>
        </div>

        <div id="empty-cart" style="display: none; text-align: center; padding: 4rem;">
            <i class="ph ph-shopping-cart" style="font-size: 4rem; color: var(--text-light); margin-bottom: 1rem;"></i>
            <h3>Your cart is empty</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Looks like you haven't added any deals yet.
            </p>
            <a href="index.html" class="btn btn-primary">Start Shopping</a>
        </div>
    </div>

    <!-- Recommended Deals -->
    <section class="container" style="margin-top: 4rem; margin-bottom: 4rem;">
        <h2 class="section-title">Deals You Might Like</h2>
        <div class="deal-grid" id="cart-recommended">
            <!-- Recommendations -->
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/cart-page.js"></script>
</body>

</html>
