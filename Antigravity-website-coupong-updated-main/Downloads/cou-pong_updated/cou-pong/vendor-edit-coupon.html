<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Coupon | Cou-pong Business</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --business-primary: #4F46E5;
        }

        .sidebar-link.active {
            background: #EEF2FF;
            color: var(--business-primary);
        }

        .btn-primary {
            background: var(--business-primary);
            border-color: var(--business-primary);
        }

        .btn-danger {
            background: var(--danger-color, #ef4444);
            border-color: var(--danger-color, #ef4444);
            color: white;
        }

        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--business-primary);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="vendor-dashboard.html" class="logo">
                <i class="ph-fill ph-tag-chevron" style="color: var(--business-primary);"></i>
                Cou-<span>pong</span>
                <span
                    style="font-size: 0.8rem; background: #EEF2FF; padding: 2px 8px; border-radius: 4px; margin-left: 10px; color: var(--business-primary); font-weight: 600;">Partner</span>
            </a>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="text-align: right;">
                    <div style="font-weight: 600;" id="vendor-name-display">Loading...</div>
                </div>
                <div style="width: 40px; height: 40px; background: #E0E7FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--business-primary); font-weight: bold;"
                    id="vendor-initials">B</div>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <a href="vendor-dashboard.html" class="sidebar-link"><i class="ph-bold ph-squares-four"></i>
                    Dashboard</a>
                <a href="vendor-create-coupon.html" class="sidebar-link"><i class="ph-bold ph-plus-circle"></i>
                    Create Coupon</a>
                <a href="vendor-coupons.html" class="sidebar-link active"><i class="ph-bold ph-tag"></i> Coupons</a>
                <a href="vendor-analytics.html" class="sidebar-link"><i class="ph-bold ph-chart-line-up"></i>
                    Analytics</a>
                <a href="vendor-profile.html" class="sidebar-link"><i class="ph-bold ph-storefront"></i> Store
                    Profile</a>
                <a href="#" class="sidebar-link" onclick="auth.logout()"
                    style="margin-top: auto; color: var(--danger-color);"><i class="ph-bold ph-sign-out"></i> Logout</a>
            </nav>
        </aside>

        <main class="dashboard-content">
            <div style="margin-bottom: 2rem;">
                <a href="vendor-coupons.html"
                    style="color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 5px; margin-bottom: 1rem;">
                    <i class="ph ph-arrow-left"></i> Back to Coupons
                </a>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1 style="font-size: 1.8rem;">Edit Coupon</h1>
                    <div style="display: flex; gap: 1rem;">
                        <button id="delete-btn" class="btn btn-danger"
                            style="display: flex; align-items: center; gap: 5px; padding: 0.5rem 1rem; border-radius: var(--radius-md); border: none; cursor: pointer;">
                            <i class="ph ph-trash"></i> Delete
                        </button>
                    </div>
                </div>
            </div>

            <form id="edit-coupon-form"
                style="background: white; padding: 2rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); max-width: 800px;">

                <div class="form-section">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0;">Basic Details</h3>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-weight: 500;">Status:</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="status-toggle">
                                <span class="slider"></span>
                            </label>
                            <span id="status-text" style="font-size: 0.9rem; font-weight: 600;">ACTIVE</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Coupon Title</label>
                        <input type="text" class="form-input" id="title" placeholder="e.g. 50% Off Pizza" required>
                    </div>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label">Description</label>
                        <textarea class="form-input" id="description" rows="3"
                            placeholder="Brief description of the deal..."></textarea>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label">Image</label>
                        <div
                            style="border: 2px dashed var(--border-color); padding: 2rem; text-align: center; border-radius: var(--radius-md); background: var(--surface-color);">
                            <i class="ph ph-image" style="font-size: 2rem; color: var(--text-secondary);"></i>
                            <p style="margin-top: 0.5rem; color: var(--text-secondary);">Click to upload image (Demo)
                            </p>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="margin-bottom: 1rem;">Discount Rules</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select class="form-input" id="type">
                                <option value="percentage">Percentage (%)</option>
                                <option value="flat">Flat Amount ($)</option>
                                <option value="b1g1">Buy 1 Get 1</option>
                                <option value="b2g1">Buy 2 Get 1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Value</label>
                            <input type="number" class="form-input" id="value" placeholder="e.g. 50">
                        </div>
                    </div>

                    <div class="form-row" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Min Spend ($)</label>
                            <input type="number" class="form-input" id="minSpend" placeholder="e.g. 20">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Max Discount ($)</label>
                            <input type="number" class="form-input" id="maxDiscount" placeholder="e.g. 100">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem; margin-bottom: 1rem;">
                        <label class="form-label">Number of Tickets (Total Available)</label>
                        <input type="number" class="form-input" id="quantity" placeholder="e.g. 100">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Limit Per User</label>
                        <input type="number" class="form-input" id="userLimit" placeholder="e.g. 1">
                    </div>

                    <div class="form-row" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Valid From</label>
                            <input type="date" class="form-input" id="startDate" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Expires On</label>
                            <input type="date" class="form-input" id="endDate" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label">Active Days</label>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <label><input type="checkbox" name="days" value="Mon" checked> Mon</label>
                            <label><input type="checkbox" name="days" value="Tue" checked> Tue</label>
                            <label><input type="checkbox" name="days" value="Wed" checked> Wed</label>
                            <label><input type="checkbox" name="days" value="Thu" checked> Thu</label>
                            <label><input type="checkbox" name="days" value="Fri" checked> Fri</label>
                            <label><input type="checkbox" name="days" value="Sat" checked> Sat</label>
                            <label><input type="checkbox" name="days" value="Sun" checked> Sun</label>
                        </div>
                    </div>

                    <div class="form-row" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Time Start</label>
                            <input type="time" class="form-input" id="timeStart">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Time End</label>
                            <input type="time" class="form-input" id="timeEnd">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="margin-bottom: 1rem;">Targeting</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" class="form-input" id="city" placeholder="e.g. Pune">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Locality / Area</label>
                            <input type="text" class="form-input" id="locality" placeholder="e.g. Koregaon Park">
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label class="form-label">Category</label>
                        <select class="form-input" id="category">
                            <option value="food_drink">Food & Drink</option>
                            <option value="health_fitness">Health & Fitness</option>
                            <option value="beauty_wellness">Beauty & Wellness</option>
                            <option value="family">Family</option>
                            <option value="digital">Digital</option>
                            <option value="home">Home</option>
                            <option value="grocery">Grocery</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="margin-bottom: 1rem;">Terms & Conditions</h3>
                    <div class="form-group">
                        <textarea class="form-input" id="terms" rows="4"
                            placeholder="Enter terms and conditions..."></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3 style="margin-bottom: 1rem;">Usage Statistics</h3>
                    <div class="form-row">
                        <div style="background: var(--surface-color); padding: 1rem; border-radius: var(--radius-md);">
                            <div style="font-size: 0.9rem; color: var(--text-secondary);">Redeemed</div>
                            <div style="font-size: 1.5rem; font-weight: 700;" id="stats-redeemed">0</div>
                        </div>
                        <div style="background: var(--surface-color); padding: 1rem; border-radius: var(--radius-md);">
                            <div style="font-size: 0.9rem; color: var(--text-secondary);">Remaining</div>
                            <div style="font-size: 1.5rem; font-weight: 700;" id="stats-remaining">0</div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1; padding: 1rem; font-size: 1rem;">Save
                        Changes</button>
                    <a href="vendor-coupons.html" class="btn btn-text"
                        style="flex: 1; padding: 1rem; font-size: 1rem; text-align: center; border: 1px solid var(--border-color); border-radius: var(--radius-md);">Cancel</a>
                </div>
            </form>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/vendor-sim.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = auth.getSession();
            if (!session || session.type !== 'vendor') { window.location.href = 'vendor-login.html'; return; }

            document.getElementById('vendor-name-display').textContent = session.businessName || 'Business';
            document.getElementById('vendor-initials').textContent = (session.businessName || 'B').charAt(0).toUpperCase();

            // Get Coupon ID
            const urlParams = new URLSearchParams(window.location.search);
            const couponId = urlParams.get('id');

            if (!couponId) {
                alert('No coupon specified');
                window.location.href = 'vendor-coupons.html';
                return;
            }

            // Load Data
            const coupon = VendorSim.getCouponById(session.email, couponId);
            if (!coupon) {
                alert('Coupon not found');
                window.location.href = 'vendor-coupons.html';
                return;
            }

            // Populate Form
            document.getElementById('title').value = coupon.title || '';
            document.getElementById('description').value = coupon.description || '';
            document.getElementById('type').value = coupon.type || 'percentage';
            document.getElementById('value').value = coupon.value || '';
            document.getElementById('quantity').value = coupon.quantity || ''; // Ticket Number
            document.getElementById('city').value = coupon.city || '';
            document.getElementById('locality').value = coupon.locality || '';
            document.getElementById('category').value = coupon.category || 'food_drink';
            document.getElementById('startDate').value = coupon.startDate || '';
            document.getElementById('endDate').value = coupon.endDate || '';

            // New Fields
            document.getElementById('minSpend').value = coupon.minSpend || '';
            document.getElementById('maxDiscount').value = coupon.maxDiscount || '';
            document.getElementById('userLimit').value = coupon.userLimit || '';
            document.getElementById('timeStart').value = coupon.timeStart || '';
            document.getElementById('timeEnd').value = coupon.timeEnd || '';
            document.getElementById('terms').value = coupon.terms || '';

            // Status
            const statusToggle = document.getElementById('status-toggle');
            const statusText = document.getElementById('status-text');
            statusToggle.checked = coupon.status === 'active';
            statusText.textContent = coupon.status ? coupon.status.toUpperCase() : 'PENDING';
            statusText.style.color = coupon.status === 'active' ? 'var(--success-color)' : 'var(--warning-color)';

            statusToggle.addEventListener('change', () => {
                const isActive = statusToggle.checked;
                statusText.textContent = isActive ? 'ACTIVE' : 'INACTIVE';
                statusText.style.color = isActive ? 'var(--success-color)' : 'var(--text-secondary)';
            });

            // Stats
            document.getElementById('stats-redeemed').textContent = coupon.redemptions || 0;
            // Assuming remaining = quantity - redemptions
            const qty = parseInt(coupon.quantity) || 0;
            const red = parseInt(coupon.redemptions) || 0;
            document.getElementById('stats-remaining').textContent = qty > 0 ? (qty - red) : 'Unlimited';


            // Update Handler
            document.getElementById('edit-coupon-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.textContent;
                btn.disabled = true;
                btn.textContent = 'Saving...';

                const updatedData = {
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value,
                    type: document.getElementById('type').value,
                    value: document.getElementById('value').value,
                    quantity: document.getElementById('quantity').value,
                    city: document.getElementById('city').value,
                    locality: document.getElementById('locality').value,
                    category: document.getElementById('category').value,
                    startDate: document.getElementById('startDate').value,
                    endDate: document.getElementById('endDate').value,
                    minSpend: document.getElementById('minSpend').value,
                    maxDiscount: document.getElementById('maxDiscount').value,
                    userLimit: document.getElementById('userLimit').value,
                    timeStart: document.getElementById('timeStart').value,
                    timeEnd: document.getElementById('timeEnd').value,
                    terms: document.getElementById('terms').value,
                    status: document.getElementById('status-toggle').checked ? 'active' : 'inactive'
                };

                try {
                    // Try Real Backend (Assuming similar endpoint) - Skipping for now as we use Sim
                    // Mock Logic
                    const success = VendorSim.updateCoupon(session.email, couponId, updatedData);
                    if (success) {
                        alert("Coupon Updated Successfully!");
                        window.location.href = 'vendor-coupons.html';
                    } else {
                        throw new Error("Update failed");
                    }

                } catch (err) {
                    console.error(err);
                    alert('Failed to update coupon');
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            });

            // Delete Handler
            document.getElementById('delete-btn').addEventListener('click', () => {
                if (confirm('Are you sure you want to delete this coupon? This action cannot be undone.')) {
                    VendorSim.deleteCoupon(session.email, couponId);
                    window.location.href = 'vendor-coupons.html';
                }
            });
        });
    </script>
</body>

</html>
