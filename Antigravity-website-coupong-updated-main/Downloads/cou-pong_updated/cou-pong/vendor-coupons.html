<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coupons | Cou-pong Partner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary-purple: #6366f1;
            --success-green: #10b981;
            --warning-yellow: #f59e0b;
            --error-red: #ef4444;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafb;
            margin: 0;
            padding: 2rem;
            color: var(--gray-900);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            margin: 0;
        }

        .btn {
            background: var(--primary-purple);
            color: white;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .coupon-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        th,
        td {
            text-align: left;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: var(--gray-700);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: #ECFDF5;
            color: var(--success-green);
        }

        .status-paused {
            background: #FEF3C7;
            color: var(--warning-yellow);
        }

        .action-link {
            color: var(--primary-purple);
            text-decoration: none;
            font-weight: 500;
            margin-right: 1rem;
        }

        .action-link.delete {
            color: var(--error-red);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1 class="title">My Coupons</h1>
        <a href="create-coupon-advanced.html" class="btn">
            <i class="ph-bold ph-plus"></i> Create New Coupon
        </a>
    </div>

    <table class="coupon-table" id="couponTable">
        <thead>
            <tr>
                <th>Title</th>
                <th>Discount</th>
                <th>Views</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Injected via JS -->
        </tbody>
    </table>

    <div class="empty-state" id="emptyState">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🎫</div>
        <h3>No coupons created yet</h3>
        <p style="color: var(--gray-700); margin-bottom: 2rem;">Create your first deal to start attracting customers.
        </p>
        <a href="create-coupon-advanced.html" class="btn">Create Now</a>
    </div>

    <script src="js/coupong-db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initializeDatabase();
            loadCoupons();
        });

        function loadCoupons() {
            const coupons = getAllCoupons();
            const tbody = document.getElementById('tableBody');

            if (coupons.length === 0) {
                document.getElementById('couponTable').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            tbody.innerHTML = '';
            coupons.forEach(c => {
                let discountText = c.discount_type === 'percentage' ? `${c.discount_value}%` : `₹${c.discount_value}`;

                const row = `
                    <tr>
                        <td style="font-weight: 600;">${c.title}</td>
                        <td>${discountText}</td>
                        <td>${c.total_views || 0}</td>
                        <td><span class="status-badge status-${c.status}">${c.status}</span></td>
                        <td>
                            <a href="edit-coupon.html?id=${c.id}" class="action-link">Edit</a>
                            <a href="#" onclick="deleteItem(${c.id})" class="action-link delete">Delete</a>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this coupon?')) {
                deleteCoupon(id);
                loadCoupons();
            }
        }
    </script>
</body>

</html>
