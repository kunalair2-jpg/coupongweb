<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login | Cou-pong Business</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --business-primary: #4F46E5;
            /* Indigo */
        }

        body {
            background: #F3F4F6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .logo span {
            color: var(--business-primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--business-primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-business {
            background-color: var(--business-primary);
            color: white;
            width: 100%;
            padding: 0.875rem;
            border-radius: var(--radius-full);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-business:hover {
            opacity: 0.9;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--business-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .badge-business {
            background: #EEF2FF;
            color: var(--business-primary);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            vertical-align: middle;
            margin-left: 8px;
        }

        .message-box {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            display: none;
        }

        .message-box.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .message-box.success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>

<body>

    <div class="auth-container animate-fade-in">
        <div class="auth-card" id="login-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="index.html" class="logo"
                    style="display: inline-block; text-decoration: none; font-size: 1.5rem; font-weight: 800; color: var(--text-main);">
                    <i class="ph-fill ph-tag-chevron" style="color: var(--business-primary);"></i>
                    Cou-<span>pong</span>
                </a>
                <span class="badge-business">FOR BUSINESS</span>
            </div>

            <h2 id="auth-title" style="margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif; font-size: 1.5rem;">
                Partner Login</h2>
            <div id="message-box" class="message-box"></div>

            <form id="vendor-login-form">
                <div class="form-group">
                    <label class="form-label">Business Email</label>
                    <input type="email" class="form-input" id="email" placeholder="owner@business.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="" required>
                </div>

                <button type="submit" class="btn-business">Log In</button>
            </form>

            <div class="auth-footer" id="auth-footer">
                Don't have a partner account? <a href="vendor-signup.html">Register Business</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('vendor-login-form');
            const msg = document.getElementById('message-box');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = form.querySelector('button');

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                btn.disabled = true;
                btn.innerHTML = 'Logging In...';

                try {
                    // Requires auth.requestVendorLogin
                    const result = await auth.requestVendorLogin(email, password);

                    if (result.success) {
                        showMessage('Login success! Redirecting...', 'success');
                        setTimeout(() => window.location.href = 'vendor-dashboard.html', 1000);
                    } else {
                        showMessage(result.error || 'Login failed', 'error');
                        btn.disabled = false;
                        btn.innerHTML = 'Log In';
                    }
                } catch (err) {
                    console.error(err);
                    showMessage("Error: " + err.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Log In';
                }
            });

            function showMessage(text, type) {
                msg.textContent = text;
                msg.className = `message-box ${type}`;
                msg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
