<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Cou-pong Business</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --business-primary: #4F46E5;
        }

        .sidebar-link.active {
            background: #EEF2FF;
            color: var(--business-primary);
        }

        .chart-bar {
            background: #EEF2FF;
            border-radius: 4px;
            height: 20px;
            margin-bottom: 10px;
            position: relative;
        }

        .chart-fill {
            background: var(--business-primary);
            height: 100%;
            border-radius: 4px;
            transition: width 1s;
            width: 0;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="vendor-dashboard.html" class="logo">
                <i class="ph-fill ph-tag-chevron" style="color: var(--business-primary);"></i>
                Cou-<span>pong</span>
                <span
                    style="font-size: 0.8rem; background: #EEF2FF; padding: 2px 8px; border-radius: 4px; margin-left: 10px; color: var(--business-primary); font-weight: 600;">Partner</span>
            </a>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="text-align: right;">
                    <div style="font-weight: 600;" id="vendor-name-display">Loading...</div>
                </div>
                <div style="width: 40px; height: 40px; background: #E0E7FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--business-primary); font-weight: bold;"
                    id="vendor-initials">B</div>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-menu">
                <a href="vendor-dashboard.html" class="sidebar-link"><i class="ph-bold ph-squares-four"></i>
                    Dashboard</a>
                <a href="vendor-create-coupon.html" class="sidebar-link"><i class="ph-bold ph-plus-circle"></i> Create
                    Coupon</a>
                <a href="vendor-coupons.html" class="sidebar-link"><i class="ph-bold ph-tag"></i> Coupons</a>
                <a href="vendor-analytics.html" class="sidebar-link active"><i class="ph-bold ph-chart-line-up"></i>
                    Analytics</a>
                <a href="vendor-profile.html" class="sidebar-link"><i class="ph-bold ph-storefront"></i> Store
                    Profile</a>
                <a href="#" class="sidebar-link" onclick="auth.logout()"
                    style="margin-top: auto; color: var(--danger-color);"><i class="ph-bold ph-sign-out"></i> Logout</a>
            </nav>
        </aside>

        <main class="dashboard-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.8rem;">Performance Analytics</h1>
                <div style="color: var(--text-secondary); font-size: 0.9rem;">Last 30 Days</div>
            </div>

            <div class="stat-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 2rem;">
                <div class="stat-card">
                    <span class="stat-label">Total Views</span>
                    <span class="stat-value" id="total-views">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Redemptions</span>
                    <span class="stat-value" id="total-redeem">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Click Rate</span>
                    <span class="stat-value" id="ctr">0%</span>
                </div>
            </div>

            <div
                style="background: white; padding: 2rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                <h3 style="margin-bottom: 1.5rem;">Views by Coupon</h3>
                <div id="views-chart">
                    Loading Data...
                </div>
            </div>

        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/vendor-sim.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = auth.getSession();
            if (!session || session.type !== 'vendor') { window.location.href = 'vendor-login.html'; return; }

            document.getElementById('vendor-name-display').textContent = session.businessName || 'Business';
            document.getElementById('vendor-initials').textContent = (session.businessName || 'B').charAt(0).toUpperCase();

            // Load Data
            const coupons = VendorSim.getCoupons(session.email);

            const totalViews = coupons.reduce((s, c) => s + (c.views || 0), 0);
            const totalRedeems = coupons.reduce((s, c) => s + (c.redemptions || 0), 0);
            const ctr = totalViews > 0 ? Math.round((totalRedeems / totalViews) * 100) : 0;

            document.getElementById('total-views').textContent = totalViews;
            document.getElementById('total-redeem').textContent = totalRedeems;
            document.getElementById('ctr').textContent = ctr + '%';

            // Render Chart
            const chartContainer = document.getElementById('views-chart');
            if (coupons.length > 0) {
                let html = '';
                const maxViews = Math.max(...coupons.map(c => c.views || 0), 10); // avoid /0

                coupons.forEach(c => {
                    const width = ((c.views || 0) / maxViews) * 100;
                    html += `
                        <div style="margin-bottom: 1rem;">
                            <div style="display:flex; justify-content:space-between; margin-bottom: 4px; font-size: 0.9rem;">
                                <span>${c.title}</span>
                                <span>${c.views || 0} views</span>
                            </div>
                            <div class="chart-bar">
                                <div class="chart-fill" style="width: ${width}%"></div>
                            </div>
                        </div>
                    `;
                });
                chartContainer.innerHTML = html;

                // Animate bars
                setTimeout(() => {
                    document.querySelectorAll('.chart-fill').forEach(el => {
                        // Trigger CSS transition logic if added properly, here just static render is fine
                    });
                }, 100);

            } else {
                chartContainer.innerHTML = '<p>No data available yet.</p>';
            }
        });
    </script>
</body>

</html>
