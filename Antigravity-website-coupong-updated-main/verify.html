<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Email... | Cou-pong</title>
    <link rel="stylesheet" href="css/variables.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8fafc;
            text-align: center;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h2 {
            margin-bottom: 1rem;
            color: #1e293b;
        }

        p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .success {
            color: #10b981;
            font-weight: bold;
        }

        .error {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <div id="loader" class="spinner"></div>
        <h2 id="status">Verifying email...</h2>
        <p id="message">Please wait while we activate your account.</p>
        <a id="login-btn" href="login.html"
            style="display: none; background: #3b82f6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px;">Go
            to Login</a>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const email = params.get('email');

            if (!token || !email) {
                showError('Invalid verification link.');
                return;
            }

            try {
                // Uses auth.js verifyToken which handles both Backend and Simulation
                const result = await auth.verifyToken(email, token);

                if (result.success) {
                    showSuccess('Email Verified!', result.message || 'Your account is now active.');
                } else {
                    showError(result.error || 'Verification failed.');
                }
            } catch (err) {
                showError('Unexpected error during verification.');
            }
        });

        function showSuccess(title, msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').textContent = title;
            document.getElementById('status').className = 'success';
            document.getElementById('message').textContent = msg;
            document.getElementById('login-btn').style.display = 'inline-block';
        }

        function showError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status').textContent = 'Error';
            document.getElementById('status').className = 'error';
            document.getElementById('message').textContent = msg;
        }
    </script>
</body>

</html>
